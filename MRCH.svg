<style> 
  .container { 
    background-color: #1a1a1a; 
    color: white; 
    padding: 15px; /* 여백 축소 */
    border-radius: 12px; 
    width: 280px; /* 가로 폭 축소 */
    font-family: 'Pretendard', sans-serif; 
    text-align: center; 
    
    /* 네온 테두리 */
    border: 1px solid #00ffcc; 
    box-shadow: 0 0 12px rgba(0, 255, 204, 0.2), 0 8px 25px rgba(0,0,0,0.5);
  } 

  .playing { font-size: 11px; color: #aaa; margin-bottom: 8px; } 
  .logo { width: 16px; vertical-align: middle; } 

  .cover { 
    width: 100%; 
    aspect-ratio: 1 / 1;
    object-fit: cover;
    border-radius: 8px; 
    margin: 10px 0; 
    transition: transform 0.3s ease; 
  } 
  .cover:hover { transform: scale(1.02); } 

  .artist { font-size: 12px; color: #00ffcc; font-weight: 600; } 
  .song { font-size: 14px; margin: 4px 0 15px 0; font-weight: 800; } 
  .release { font-size: 11px; color: #777; margin-top: 2px; }

  /* 비주얼라이저 - 카드 크기에 맞춰 높이 조절 */ 
  #bars { 
    display: flex; 
    justify-content: center; 
    align-items: flex-end; 
    height: 35px; /* 높이 축소 */
    gap: 2px; 
  } 

  .bar { 
    width: 3px; /* 두께 살짝 축소 */
    background: #00ffcc; 
    animation: visualize 1s ease-in-out infinite; 
  } 

  .bar:nth-child(3n) { background: #ffffff; animation-duration: 0.8s; } 
  .bar:nth-child(3n+1) { animation-duration: 1.2s; } 
  .bar:nth-child(5n) { animation-duration: 1.5s; } 
  .bar:nth-child(even) { animation-delay: 0.2s; } 

  @keyframes visualize { 
    0%, 100% { height: 4px; } 
    50% { height: 28px; } 
  } 
</style> 

<div class="container"> 
  <div class="playing"> 
    Now playing on <img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/1/19/Spotify_logo_without_text.svg" /> 
  </div> 
   
  <div class="album-art"> 
      <img src="MRCH.jpeg" class="cover" alt="MRCH" />
  </div> 

  <div class="song">Though we have the earth</div> 
  <div class="artist">℗ MRCH Music</div> 
  <div class="release">Released on: 2023-10-18</div> 

  <div id="bars"> 
    <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div> 
    <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div> 
    <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div> 
    <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div> 
    <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div> 
  </div> 
</div>
